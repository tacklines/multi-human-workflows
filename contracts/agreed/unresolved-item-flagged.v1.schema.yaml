# contracts/agreed/unresolved-item-flagged.v1.schema.yaml
schema:
  name: UnresolvedItemFlagged
  version: "v1"
  owner: "jam-artifacts"
  source: "events/candidates/collaborative-storytelling.yaml"
  formalized: "2026-02-28"

description: >
  Emitted when a facilitator flags an item as unresolved during the jam session.
  Tracks decisions deferred or requiring additional discussion. Currently only
  available via the SessionStore API — no HTTP endpoint exposed yet.

fields:
  - name: id
    type: string
    required: true
    description: "Unique identifier for the unresolved item, generated server-side."
    confidence: CONFIRMED
    constraints:
      - "non-empty string"
    example: "unresolved-001"

  - name: description
    type: string
    required: true
    description: "Description of the unresolved issue."
    confidence: CONFIRMED
    constraints:
      - "non-empty string"
    example: "Unclear whether PaymentReceived belongs to Order or Payment context"

  - name: related_overlap
    type: string
    required: false
    description: "Label of the overlap this unresolved item relates to, if any."
    confidence: CONFIRMED
    constraints:
      - "non-empty string if present"
    example: "PaymentReceived ownership"

  - name: flagged_by
    type: string
    required: true
    description: "Name of the participant who flagged this item."
    confidence: CONFIRMED
    constraints:
      - "non-empty string"
    example: "Bob"

  - name: flagged_at
    type: timestamp
    required: true
    description: "ISO 8601 timestamp of when the item was flagged."
    confidence: CONFIRMED
    constraints:
      - "ISO 8601 timestamp"
    example: "2026-02-28T17:30:00Z"

envelope:
  topic: "jam.unresolved"
  ordering-key: "id"
  idempotency-key: "id"

unresolved:
  - "No HTTP endpoint exposed for this event — only available via SessionStore.flagUnresolved(). Consider adding a POST /api/sessions/:code/jam/flag endpoint."
