# contracts/agreed/jam-session-started.v1.schema.yaml
schema:
  name: JamSessionStarted
  version: "v1"
  owner: "jam-artifacts"
  source: "events/candidates/collaborative-storytelling.yaml"
  formalized: "2026-02-28"

description: >
  Emitted when a facilitator initiates the collaborative jam session for a
  session. Creates empty JamArtifacts (resolutions, ownership map, unresolved
  items). Idempotent — re-requesting returns existing jam artifacts.

fields:
  - name: code
    type: string
    required: true
    description: "Session join code."
    confidence: CONFIRMED
    constraints:
      - "6-character alphanumeric string"
    example: "ABC123"

  - name: started_at
    type: timestamp
    required: true
    description: "ISO 8601 timestamp of when the jam session was started."
    confidence: CONFIRMED
    constraints:
      - "ISO 8601 timestamp"
    example: "2026-02-28T17:00:00Z"

envelope:
  topic: "jam.lifecycle"
  ordering-key: "code"
  idempotency-key: "code"

unresolved: []
