# contracts/agreed/session-persisted.v1.schema.yaml
schema:
  name: SessionPersisted
  version: "v1"
  owner: "session"
  source: "events/candidates/collaborative-storytelling.yaml"
  formalized: "2026-02-28"

description: >
  Emitted when session state is serialized and written to the persistence file
  at data/sessions.json. Triggered by any state mutation on the session. This is
  an internal infrastructure event, not a domain event visible to participants.

fields:
  - name: code
    type: string
    required: true
    description: "Session join code identifying the persisted session."
    confidence: CONFIRMED
    constraints:
      - "6-character alphanumeric string"
    example: "ABC123"

  - name: persisted_at
    type: timestamp
    required: true
    description: "ISO 8601 timestamp of when persistence occurred."
    confidence: CONFIRMED
    constraints:
      - "ISO 8601 timestamp"
    example: "2026-02-28T16:00:01Z"

envelope:
  topic: "session.infrastructure"
  ordering-key: "code"
  idempotency-key: "code + persisted_at"

unresolved: []
