# ─────────────────────────────────────────────────
# BOUNDARY ASSUMPTIONS
# ─────────────────────────────────────────────────

boundary_assumptions:

  - id: "BA-1"
    type: ownership
    statement: "The Sandbox aggregate owns subprocess lifecycle (create, start, execute, stop, destroy) and the WorkItem aggregate does NOT directly manage subprocesses."
    affects_events:
      - "SandboxCreated"
      - "SandboxStarted"
      - "SandboxExecutionCompleted"
      - "WorkItemSandboxProvisioned"
    confidence: LIKELY
    verify_with: "team discussion — should the executor or the sandbox BC own the subprocess lifecycle?"

  - id: "BA-2"
    type: contract
    statement: "SandboxExecutionCompleted carries exit_code, stdout, stderr, and duration_seconds — this is sufficient for agents BC to determine work item success or failure without additional data."
    affects_events:
      - "SandboxExecutionCompleted"
      - "WorkItemCompleted"
      - "WorkItemFailed"
    confidence: LIKELY
    verify_with: "Epic 2 implementation — Claude Code output may require structured parsing beyond raw stdout"

  - id: "BA-3"
    type: ordering
    statement: "SandboxCreated -> SandboxStarted -> SandboxExecutionCompleted always precedes WorkItemCompleted. The sandbox lifecycle must complete before the work item can transition to terminal state."
    affects_events:
      - "SandboxExecutionCompleted"
      - "WorkItemCompleted"
      - "SandboxFailed"
      - "WorkItemFailed"
    confidence: LIKELY
    verify_with: "Epic 1 integration — need to verify this ordering holds under concurrent dispatch"

  - id: "BA-4"
    type: ownership
    statement: "The process manager (RequirementExecutionProcessManager) is the sole coordinator for cross-BC orchestration. It owns the decision of when to create sandboxes, which agents to assign, and when to dispatch concurrently."
    affects_events:
      - "ConcurrentDispatchStarted"
      - "WorkItemSandboxProvisioned"
      - "RequirementStarted"
      - "RequirementCompleted"
    confidence: LIKELY
    verify_with: "architecture review — DD-002 says flat pool, but process manager may need more authority for concurrent dispatch"

  - id: "BA-5"
    type: contract
    statement: "The Claude Code CLI invocation uses --dangerously-skip-permissions and --print flags, passes the task prompt via stdin or --prompt flag, and returns structured output on stdout that can be parsed into an ExecutionResult."
    affects_events:
      - "ClaudeCodeSessionInvoked"
      - "SandboxExecutionCompleted"
    confidence: POSSIBLE
    verify_with: "Epic 2 spike — need to verify Claude Code CLI interface and output format"

  - id: "BA-6"
    type: existence
    statement: "WorktreeManager is owned by the sandbox BC, not a shared utility. Each sandbox gets its own worktree, and the worktree lifecycle is tied to the sandbox lifecycle."
    affects_events:
      - "SandboxCreated"
      - "SandboxDestroyed"
      - "WorkItemSandboxProvisioned"
    confidence: CONFIRMED
    verify_with: "already confirmed in codebase — WorktreeManager lives in sandbox package"

  - id: "BA-7"
    type: ordering
    statement: "Under concurrent dispatch, multiple SandboxCreated events can occur simultaneously, but each sandbox operates independently. There is no global ordering constraint between concurrent sandbox lifecycles."
    affects_events:
      - "ConcurrentDispatchStarted"
      - "SandboxCreated"
      - "SandboxExecutionCompleted"
    confidence: POSSIBLE
    verify_with: "Epic 3 — concurrent execution may reveal ordering dependencies not visible in sequential flow"

  - id: "BA-8"
    type: ownership
    statement: "The event store subscription mechanism (InMemoryEventStore.subscribe()) should be the primary channel for cross-BC event propagation, replacing the current direct method calls from API layer to process manager."
    affects_events:
      - "RequirementDecomposed"
      - "SandboxExecutionCompleted"
      - "SandboxFailed"
    confidence: LIKELY
    verify_with: "architecture review — current direct wiring works but doesn't scale to concurrent dispatch where events arrive asynchronously"
