version: v1.3.0

dsn: postgres://seam:seam@postgres:5432/kratos?sslmode=disable

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:8585
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
        - X-Session-Token
      exposed_headers:
        - Content-Type
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:8585/
  allowed_return_urls:
    - http://localhost:8585

  methods:
    password:
      enabled: true
    totp:
      enabled: true
      config:
        issuer: Seam
    webauthn:
      enabled: true
      config:
        rp:
          display_name: Seam
          id: localhost
          origins:
            - http://localhost:8585
        passwordless: false
    passkey:
      enabled: true
      config:
        rp:
          display_name: Seam
          id: localhost
          origins:
            - http://localhost:8585

  flows:
    login:
      ui_url: http://localhost:8585/auth/login
      lifespan: 10m
    registration:
      enabled: false
      ui_url: http://localhost:8585/auth/register
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: session
    settings:
      ui_url: http://localhost:8585/settings
      privileged_session_max_age: 15m
    recovery:
      enabled: true
      ui_url: http://localhost:8585/auth/recovery
    verification:
      enabled: true
      ui_url: http://localhost:8585/auth/verify
    error:
      ui_url: http://localhost:8585/auth/error
    logout:
      after:
        default_browser_return_url: http://localhost:8585/

log:
  level: info
  format: json

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

session:
  lifespan: 24h
  cookie:
    same_site: Lax

hashers:
  argon2:
    parallelism: 1
    memory: 128MB
    iterations: 2
    salt_length: 16
    key_length: 16

ciphers:
  algorithm: xchacha20-poly1305

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - INSECURE-DEV-SECRET-32-CHARS-ABC
